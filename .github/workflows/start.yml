name: "START"

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 执行工作流序列
        run: |
          # 定义任务列表：文件名|等待时间(秒)
          # 你可以在这里非常方便地编辑顺序和时间
          WORKFLOWS=(
            "gslege.yml|20"
            "vvhan.yml|20"
            "wetest.yml|20"
            "nirevil.yml|20"
            "mingyu.yml|20"
            "zhixuanwang.yml|20"
            "xinyitang3.yml|40"
            "uouin.yml|40"
            "tiancheng.yml|40"
            "tiancheng-sn.yml|40"
            "vps789.yml|0"
          )

          for item in "${WORKFLOWS[@]}"; do
            IFS="|" read -r FILE WAIT_TIME <<< "$item"
            
            echo "---------------------------------------"
            echo "▶️ 正在启动: $FILE"
            
            gh workflow run "$FILE" --ref main
            
            if [ "$WAIT_TIME" -gt 0 ]; then
              echo "⌛ 等待 ${WAIT_TIME} 秒后执行下一个任务..."
              sleep "$WAIT_TIME"
            fi
          done
        env:
          GH_TOKEN: ${{ github.token }}
